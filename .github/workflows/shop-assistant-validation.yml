name: Shop Assistant Validation

on:
  pull_request:
    paths:
      - "app/api/shop-assistant/**"
      - "app/assistant/**"
      - "app/mobile/assistant/**"
      - "app/mobile/billing/**"
      - "features/shop-assistant/**"
      - "features/billing/mobile/**"
      - "features/mobile/navigation/mobile-route-continuity.ts"
      - "shared/types/types/supabase.ts"
      - "tests/shop-assistant-*.test.ts"
      - "tests/mobile-route-continuity.test.ts"
      - ".github/workflows/shop-assistant-validation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/shop-wide-assistant-orchestration
          fetch-depth: 0

      - name: Synchronize generated snapshot schema types
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          types_path = Path("shared/types/types/supabase.ts")
          source = types_path.read_text()

          table_marker = "      shop_assistant_state_snapshots: {"
          table_anchor = "      shop_time_off: {\n"
          table_block = '''      shop_assistant_state_snapshots: {
                Row: {
                  expires_at: string
                  invalidated_at: string | null
                  refreshed_at: string
                  role: string | null
                  shop_id: string
                  snapshot: Json
                  updated_at: string
                  user_id: string
                  version: number
                }
                Insert: {
                  expires_at?: string
                  invalidated_at?: string | null
                  refreshed_at?: string
                  role?: string | null
                  shop_id: string
                  snapshot?: Json
                  updated_at?: string
                  user_id: string
                  version?: number
                }
                Update: {
                  expires_at?: string
                  invalidated_at?: string | null
                  refreshed_at?: string
                  role?: string | null
                  shop_id?: string
                  snapshot?: Json
                  updated_at?: string
                  user_id?: string
                  version?: number
                }
                Relationships: []
              }
          '''
          if table_marker not in source:
              if table_anchor not in source:
                  raise SystemExit("Snapshot table type insertion anchor was not found")
              source = source.replace(table_anchor, table_block + table_anchor, 1)

          function_marker = "      invalidate_shop_assistant_state_snapshots: {"
          function_anchor = "      receive_po_part_and_allocate: {\n"
          function_block = '''      invalidate_shop_assistant_state_snapshots: {
                Args: { p_actor_user_id: string; p_shop_id: string }
                Returns: number
              }
          '''
          if function_marker not in source:
              if function_anchor not in source:
                  raise SystemExit("Snapshot RPC type insertion anchor was not found")
              source = source.replace(function_anchor, function_block + function_anchor, 1)

          types_path.write_text(source)

          Path("features/shop-assistant/server/state/shopStateCache.ts").write_text('''import "server-only";

import type { ShopAssistantActor } from "@/features/shop-assistant/server/requireShopAssistantActor";
import { createAdminSupabase } from "@/features/shared/lib/supabase/server";
import { buildShopState } from "@/features/shop-assistant/server/state/buildShopState";
import {
  SHOP_ASSISTANT_MAX_STALE_MS,
  SHOP_ASSISTANT_STATE_TTL_MS,
  type ShopAssistantState,
} from "@/features/shop-assistant/server/state/types";
import type { Database, Json } from "@shared/types/types/supabase";

type SnapshotRow =
  Database["public"]["Tables"]["shop_assistant_state_snapshots"]["Row"];

const DEFAULT_TTL_MS = SHOP_ASSISTANT_STATE_TTL_MS;
const SNAPSHOT_SELECT =
  "shop_id, user_id, role, snapshot, version, refreshed_at, expires_at, invalidated_at, updated_at";

function dbFor(actor: ShopAssistantActor) {
  return actor.supabase;
}

function adminDb() {
  return createAdminSupabase();
}

function isRecord(value: unknown): value is Record<string, unknown> {
  return Boolean(value) && typeof value === "object" && !Array.isArray(value);
}

function isShopAssistantState(value: unknown): value is ShopAssistantState {
  if (!isRecord(value)) return false;
  return (
    typeof value.generatedAt === "string" &&
    typeof value.role === "string" &&
    typeof value.headline === "string" &&
    isRecord(value.metrics) &&
    Array.isArray(value.alerts) &&
    Array.isArray(value.suggestions)
  );
}

async function loadSnapshot(
  actor: ShopAssistantActor,
): Promise<SnapshotRow | null> {
  const { data, error } = await dbFor(actor)
    .from("shop_assistant_state_snapshots")
    .select(SNAPSHOT_SELECT)
    .eq("shop_id", actor.shopId)
    .eq("user_id", actor.userId)
    .maybeSingle();
  if (error) throw new Error(error.message);
  return data ?? null;
}

export async function getOrRefreshShopState(params: {
  actor: ShopAssistantActor;
  force?: boolean;
  ttlMs?: number;
}): Promise<ShopAssistantState> {
  const ttlMs = Math.min(
    Math.max(params.ttlMs ?? DEFAULT_TTL_MS, 5_000),
    120_000,
  );
  const nowMs = Date.now();
  const existing = await loadSnapshot(params.actor).catch(() => null);
  const roleMatches =
    (existing?.role ?? null) === (params.actor.role ?? null);
  const existingSnapshot = existing?.snapshot;
  const existingState =
    roleMatches && isShopAssistantState(existingSnapshot)
      ? existingSnapshot
      : null;
  const expiresAtMs = new Date(existing?.expires_at ?? 0).getTime();
  const isFresh = Boolean(
    !params.force &&
      existingState &&
      !existing?.invalidated_at &&
      Number.isFinite(expiresAtMs) &&
      expiresAtMs > nowMs,
  );
  const canUseStaleFallback = Boolean(
    existingState &&
      !existing?.invalidated_at &&
      Number.isFinite(expiresAtMs) &&
      nowMs - expiresAtMs <= SHOP_ASSISTANT_MAX_STALE_MS,
  );
  if (isFresh && existingState) return existingState;

  try {
    const state = await buildShopState(params.actor);
    const refreshedAt = new Date().toISOString();
    const expiresAt = new Date(Date.now() + ttlMs).toISOString();
    const snapshot = JSON.parse(JSON.stringify(state)) as Json;
    const { error } = await adminDb()
      .from("shop_assistant_state_snapshots")
      .upsert(
        {
          shop_id: params.actor.shopId,
          user_id: params.actor.userId,
          role: params.actor.role,
          snapshot,
          version: Number(existing?.version ?? 0) + 1,
          refreshed_at: refreshedAt,
          expires_at: expiresAt,
          invalidated_at: null,
          updated_at: refreshedAt,
        },
        { onConflict: "shop_id,user_id" },
      );
    if (error) throw new Error(error.message);
    return state;
  } catch (error: unknown) {
    if (canUseStaleFallback && existingState) return existingState;
    throw error;
  }
}

export async function invalidateShopState(
  actor: ShopAssistantActor,
): Promise<void> {
  const { error } = await dbFor(actor).rpc(
    "invalidate_shop_assistant_state_snapshots",
    {
      p_shop_id: actor.shopId,
      p_actor_user_id: actor.userId,
    },
  );
  if (error) throw new Error(error.message);
}
''')

          Path(".github/workflows/shop-assistant-generated-types-sync.yml").unlink(
              missing_ok=True,
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Snapshot schema types are already synchronized."
          else
            git commit -m "Add typed shop assistant snapshot schema"
            git push origin HEAD:agent/shop-wide-assistant-orchestration
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Capture TypeScript validation
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > shop-assistant-typecheck.log 2>&1
          status=$?
          cat shop-assistant-typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shop-assistant-typecheck-${{ github.run_id }}
          path: shop-assistant-typecheck.log
          if-no-files-found: error

      - name: Fail on TypeScript errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1

      - run: >-
          pnpm exec eslint
          app/api/shop-assistant
          app/assistant/page.tsx
          app/mobile/assistant/page.tsx
          app/mobile/billing/page.tsx
          features/shop-assistant
          features/billing/mobile
          features/mobile/navigation/mobile-route-continuity.ts
          tests/shop-assistant-reliability.test.ts
          tests/shop-assistant-state.test.ts
          tests/shop-assistant-actions.test.ts
          tests/shop-assistant-orchestrator.test.ts
          tests/mobile-route-continuity.test.ts

      - name: Capture focused test validation
        id: focused-tests
        shell: bash
        run: |
          set +e
          pnpm exec vitest run \
            tests/shop-assistant-reliability.test.ts \
            tests/shop-assistant-state.test.ts \
            tests/shop-assistant-actions.test.ts \
            tests/shop-assistant-orchestrator.test.ts \
            tests/mobile-route-continuity.test.ts \
            --reporter=verbose > shop-assistant-tests.log 2>&1
          status=$?
          cat shop-assistant-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shop-assistant-tests-${{ github.run_id }}
          path: shop-assistant-tests.log
          if-no-files-found: error

      - name: Fail on focused test errors
        if: steps.focused-tests.outputs.status != '0'
        run: exit 1

      - run: node scripts/audit-api-routes.mjs
