name: Fix Supabase Baseline Generator Completeness

on:
  push:
    branches:
      - fix/supabase-clean-replay

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/supabase-clean-replay

      - name: Preserve public tables that reference extension functions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/generate-supabase-public-baseline.py")
          source = path.read_text()

          source = source.replace(
              '''    if '"extensions".' in leading[:180]:
                  return False
          ''',
              '',
              1,
          )

          validation_anchor = '''def validate_snapshot(source: str) -> None:
          '''
          validation_block = '''PUBLIC_TABLE_PATTERN = re.compile(
              r'CREATE TABLE IF NOT EXISTS "public"\\."([^"]+)"',
              re.IGNORECASE,
          )


          def validate_selected_public_tables(
              source: str,
              statements: list[str],
          ) -> None:
              source_tables = set(PUBLIC_TABLE_PATTERN.findall(source))
              selected_tables = set(
                  PUBLIC_TABLE_PATTERN.findall("\\n".join(statements))
              )
              missing_tables = sorted(source_tables - selected_tables)
              if missing_tables:
                  raise RuntimeError(
                      "Public baseline selection omitted tables: "
                      + ", ".join(missing_tables)
                  )


          def validate_snapshot(source: str) -> None:
          '''
          if "validate_selected_public_tables" not in source:
              if validation_anchor not in source:
                  raise SystemExit("Validation anchor not found")
              source = source.replace(
                  validation_anchor,
                  validation_block,
                  1,
              )

          render_anchor = '''    if not statements:
                  raise RuntimeError("No public schema statements were selected")

              all_core_expression = " and\\n      ".join(
          '''
          render_replacement = '''    if not statements:
                  raise RuntimeError("No public schema statements were selected")
              validate_selected_public_tables(source, statements)

              all_core_expression = " and\\n      ".join(
          '''
          if "validate_selected_public_tables(source, statements)" not in source:
              if render_anchor not in source:
                  raise SystemExit("Render validation anchor not found")
              source = source.replace(render_anchor, render_replacement, 1)

          path.write_text(source)
          PY

      - name: Regenerate and verify the guarded baseline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate-supabase-public-baseline.py
          for table in \
            customer_quotes \
            inspection_photos \
            menu_pricing \
            parts_requests \
            punch_events \
            shop_settings \
            shop_time_slots \
            vin_decodes \
            work_order_media; do
            grep -Fq "CREATE TABLE IF NOT EXISTS \"public\".\"${table}\"" \
              supabase/migrations/20260705000000_public_schema_baseline.sql
          done

      - name: Commit generator and baseline repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/supabase-fix-baseline-generator.yml
          git add \
            scripts/generate-supabase-public-baseline.py \
            supabase/migrations/20260705000000_public_schema_baseline.sql
          git commit -m "Include all public tables in Supabase baseline"
          git push origin HEAD:fix/supabase-clean-replay
