name: Regenerate Supabase Public Baseline

on:
  push:
    branches:
      - fix/supabase-clean-replay

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/supabase-clean-replay
      - name: Regenerate guarded baseline migration
        run: python scripts/generate-supabase-public-baseline.py
      - name: Commit generated migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/supabase-regenerate-baseline.yml
          git add supabase/migrations/20260705000000_public_schema_baseline.sql
          git commit -m "Regenerate guarded Supabase public schema baseline"
          git push origin HEAD:fix/supabase-clean-replay
