name: Shop Assistant Technician Alias Patch

on:
  push:
    branches:
      - agent/shop-wide-assistant-actions

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/shop-wide-assistant-actions
      - name: Normalize technician roles in direct intent routing
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("features/shop-assistant/server/actions/directToolIntent.ts")
          source = path.read_text()

          import_anchor = 'import "server-only";\n\n'
          import_line = 'import { canonicalizeRole } from "@/features/shared/lib/rbac";\n'
          if import_line not in source:
              if import_anchor not in source:
                  raise SystemExit("Direct-intent import anchor not found")
              source = source.replace(import_anchor, import_anchor + import_line, 1)

          old = '''    const { data: techs, error } = await params.actor.supabase
      .from("profiles")
      .select("id, full_name, role")
      .eq("shop_id", params.actor.shopId)
      .ilike("full_name", `%${techQuery.replace(/[%,]/g, " ")}%`)
      .in("role", ["mechanic", "tech", "foreman", "lead_hand"])
      .limit(10);
    if (error) throw new Error(error.message);
'''
          new = '''    const { data: matchedProfiles, error } = await params.actor.supabase
      .from("profiles")
      .select("id, full_name, role")
      .eq("shop_id", params.actor.shopId)
      .ilike("full_name", `%${techQuery.replace(/[%,]/g, " ")}%`)
      .limit(25);
    if (error) throw new Error(error.message);
    const techs = (matchedProfiles ?? [])
      .filter((profile) => {
        const role = canonicalizeRole(profile.role);
        return role === "mechanic" || role === "lead_hand" || role === "foreman";
      })
      .slice(0, 10);
'''
          if old not in source:
              raise SystemExit("Direct-intent technician query block not found")
          path.write_text(source.replace(old, new, 1))
          PY
      - name: Commit technician alias fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/shop-assistant-direct-intent-role-fix.yml
          git add features/shop-assistant/server/actions/directToolIntent.ts
          git commit -m "Normalize technician aliases in assistant routing"
          git push origin HEAD:agent/shop-wide-assistant-actions
