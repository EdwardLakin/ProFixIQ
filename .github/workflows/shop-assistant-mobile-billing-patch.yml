name: Shop Assistant Mobile Billing Patch

on:
  push:
    branches:
      - agent/shop-wide-assistant-orchestration

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/shop-wide-assistant-orchestration
      - name: Add a ready-for-billing mobile work-order filter
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/mobile/work-orders/page.tsx")
          source = path.read_text()

          normal = '''const NORMAL_FLOW_STATUSES: StatusKey[] = [
  "awaiting",
  "queued",
  "in_progress",
  "on_hold",
  "planned",
];
'''
          replacement = normal + '''
const READY_FOR_BILLING_STATUSES: StatusKey[] = [
  "completed",
  "ready_to_invoice",
];
'''
          if "READY_FOR_BILLING_STATUSES" not in source:
              if normal not in source:
                  raise SystemExit("Normal status list anchor not found")
              source = source.replace(normal, replacement, 1)

          state_anchor = '''  const [forbidden, setForbidden] = useState(false);
  const [lineSignals, setLineSignals] = useState<Record<string, WorkOrderSignal>>({});

  const load = useCallback(async () => {
'''
          state_replacement = '''  const [forbidden, setForbidden] = useState(false);
  const [lineSignals, setLineSignals] = useState<Record<string, WorkOrderSignal>>({});

  useEffect(() => {
    const requestedStatus = new URLSearchParams(window.location.search).get("status");
    if (
      requestedStatus === "ready_for_billing" ||
      requestedStatus === "completed" ||
      requestedStatus === "ready_to_invoice"
    ) {
      setStatus(requestedStatus);
    }
  }, []);

  const load = useCallback(async () => {
'''
          if "requestedStatus === \"ready_for_billing\"" not in source:
              if state_anchor not in source:
                  raise SystemExit("State anchor not found")
              source = source.replace(state_anchor, state_replacement, 1)

          query_anchor = '''    if (status === "") {
      query = query.in("status", NORMAL_FLOW_STATUSES as unknown as string[]);
    } else {
      query = query.eq("status", status);
    }
'''
          query_replacement = '''    if (status === "") {
      query = query.in("status", NORMAL_FLOW_STATUSES as unknown as string[]);
    } else if (status === "ready_for_billing") {
      query = query.in(
        "status",
        READY_FOR_BILLING_STATUSES as unknown as string[],
      );
    } else {
      query = query.eq("status", status);
    }
'''
          if query_anchor not in source:
              raise SystemExit("Query filter anchor not found")
          source = source.replace(query_anchor, query_replacement, 1)

          stat_anchor = '''            <MiniStat label="Total" value={total} />
            <MiniStat label="Active" value={activeCount} accent />
'''
          stat_replacement = '''            <MiniStat label="Total" value={total} />
            <MiniStat
              label={status === "ready_for_billing" ? "Ready" : "Active"}
              value={status === "ready_for_billing" ? total : activeCount}
              accent
            />
'''
          if stat_anchor not in source:
              raise SystemExit("Metric anchor not found")
          source = source.replace(stat_anchor, stat_replacement, 1)

          option_anchor = '''                <option value="new">New</option>
                <option value="completed">Completed</option>
'''
          option_replacement = '''                <option value="new">New</option>
                <option value="ready_for_billing">Ready for billing</option>
                <option value="completed">Completed</option>
'''
          if "<option value=\"ready_for_billing\">" not in source:
              if option_anchor not in source:
                  raise SystemExit("Filter option anchor not found")
              source = source.replace(option_anchor, option_replacement, 1)

          path.write_text(source)
          PY
      - name: Commit mobile billing filter
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/mobile/work-orders/page.tsx
          git commit -m "Expose ready-to-invoice work on mobile"
          git push origin HEAD:agent/shop-wide-assistant-orchestration
