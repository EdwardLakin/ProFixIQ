name: Dump Supabase Schema

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Supabase CLI
      - uses: supabase/setup-cli@v1

      - name: Verify Supabase CLI
        run: supabase --version

      - name: Dump schema.sql using Supabase CLI
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          mkdir -p supabase
          # Correct Supabase CLI usage — no invalid flags
          supabase db dump --db-url "$DB_URL" --schema public --file supabase/schema.sql

      - name: Dump RLS policy report
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          psql "$DB_URL" -XAt -c "
            select pol.polname as policy_name,
                   rel.relname as table_name,
                   pol.cmd as command,
                   pol.permissive,
                   pg_get_expr(pol.qual, pol.relid) as using_expression,
                   pg_get_expr(pol.with_check, pol.relid) as with_check
            from pg_policy pol
            join pg_class rel on rel.oid = pol.relid
            join pg_namespace nsp on nsp.oid = rel.relnamespace
            where nsp.nspname = 'public'
            order by rel.relname, pol.polname;
          " > supabase/policy_report.txt

      - name: Commit and push schema updates
        run: |
          git config user.name "schema-bot"
          git config user.email "schema-bot@example.com"
          git add supabase/schema.sql supabase/policy_report.txt || true
          git commit -m "chore(schema): update schema and RLS policy dump" || echo "No changes to commit"
          git push || true