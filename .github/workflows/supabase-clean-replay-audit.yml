name: Supabase Clean Replay Audit

on:
  push:
    branches:
      - fix/supabase-clean-replay

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Collect migration inputs
        shell: bash
        run: |
          set -euo pipefail
          find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort > migration-files.txt
          tar -czf supabase-clean-replay-inputs.tar.gz \
            migration-files.txt \
            supabase/migrations \
            db/sql/schema.sql
      - uses: actions/upload-artifact@v4
        with:
          name: supabase-clean-replay-inputs-${{ github.run_id }}
          path: supabase-clean-replay-inputs.tar.gz
          if-no-files-found: error
