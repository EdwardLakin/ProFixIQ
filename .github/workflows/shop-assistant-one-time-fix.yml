name: Shop Assistant One-Time Fix

on:
  push:
    branches:
      - agent/shop-wide-assistant-actions

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/shop-wide-assistant-actions
      - name: Remove unused direct-intent local
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("features/shop-assistant/server/actions/directToolIntent.ts")
          source = path.read_text()
          target = '  const lower = question.toLowerCase();\n\n'
          if target not in source:
              raise SystemExit("Expected unused local was not found")
          path.write_text(source.replace(target, "", 1))
          PY
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add features/shop-assistant/server/actions/directToolIntent.ts
          git commit -m "Fix shop assistant direct intent typecheck"
          git push origin HEAD:agent/shop-wide-assistant-actions
